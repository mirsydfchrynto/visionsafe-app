<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Tech Ring -->
  <circle cx="100" cy="100" r="95" stroke="#003366" stroke-width="2" stroke-dasharray="10 5"/>
  <circle cx="100" cy="100" r="85" stroke="#003366" stroke-width="1" opacity="0.3"/>
  
  <!-- Main Eye Shape -->
  <path d="M20 100C20 100 50 40 100 40C150 40 180 100 180 100C180 100 150 160 100 160C50 160 20 100 20 100Z" fill="#1A1A1A" stroke="#003366" stroke-width="6"/>
  
  <!-- Metallic Brown Iris -->
  <circle cx="100" cy="100" r="45" fill="#5D4037" stroke="#3E2723" stroke-width="2"/>
  
  <!-- Deep Black Pupil -->
  <circle cx="100" cy="100" r="22" fill="#0D0D0D"/>
  
  <!-- Intelligent Light Reflections -->
  <circle cx="85" cy="80" r="8" fill="white" opacity="0.8"/>
  <circle cx="110" cy="115" r="4" fill="white" opacity="0.5"/>
  
  <!-- Scanning Line -->
  <rect x="40" y="98" width="120" height="4" rx="2" fill="#00E5FF" opacity="0.6">
    <animate attributeName="y" values="60;140;60" dur="3s" repeatCount="indefinite" />
  </rect>
</svg>
